name: Deploy docs

on:
  repository_dispatch:
    types: [infomap_release_published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: Tag in mapequation/infomap to build docs from (e.g. v2.9.0)
        required: true
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Build and deploy GitHub Pages docs
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Resolve release ref
        id: ref
        env:
          DISPATCH_TAG: ${{ github.event.client_payload.release_tag }}
          DISPATCH_VERSION: ${{ github.event.client_payload.version }}
          INPUT_TAG: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            tag="$DISPATCH_TAG"
            version="$DISPATCH_VERSION"
          else
            tag="$INPUT_TAG"
            version="${tag#v}"
          fi

          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Expected release tag vX.Y.Z, got: $tag" >&2
            exit 1
          fi

          {
            echo "tag=$tag"
            echo "version=$version"
          } >> "$GITHUB_OUTPUT"

      - name: Checkout infomap at release tag
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: mapequation/infomap
          ref: ${{ steps.ref.outputs.tag }}

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install published infomap with docs extras
        run: |
          python -m pip install --upgrade pip
          python -m pip install "infomap[docs]==${{ steps.ref.outputs.version }}"

      - name: Build docs
        env:
          SPHINX_SOURCE_DIR: interfaces/python/source
          SPHINX_TARGET_DIR: docs
        run: |
          set -euo pipefail

          mkdir -p "$SPHINX_TARGET_DIR"
          cp -a README.rst "$SPHINX_SOURCE_DIR/index.rst"
          trap 'rm -f "$SPHINX_SOURCE_DIR/index.rst"' EXIT

          python -m sphinx -b html "$SPHINX_SOURCE_DIR" "$SPHINX_TARGET_DIR"

          rm -rf "$SPHINX_TARGET_DIR/.doctrees"
          touch "$SPHINX_TARGET_DIR/.nojekyll"

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs
          include-hidden-files: true

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
